<!DOCTYPE html>
<html>
<head>
  <title>Company Enrichment Tool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
  <h2>Company Enrichment Tool</h2>

  <!-- Enrich Section -->
  <div class="mb-3">
    <input id="urlInput" class="form-control" placeholder="Enter company URL">
    <button class="btn btn-primary mt-2" onclick="enrich()">Enrich</button>
  </div>

  <div id="result" class="mt-3"></div>

  <!-- Results Section -->
  <button class="btn btn-success mt-4" onclick="showAll()">Show All Results</button>
  <div id="allResults" class="mt-3"></div>

<script>
// 🔗 Set this to your deployed FastAPI backend URL (Render/Railway/etc.)
const API_BASE = "https://hackathon-project-ai-automation.vercel.app/";

async function enrich() {
  const url = document.getElementById("urlInput").value;
  try {
    const res = await fetch(`${API_BASE}/enrich`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({url})
    });
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();
    document.getElementById("result").innerHTML =
      `<pre>${JSON.stringify(data, null, 2)}</pre>`;
  } catch (err) {
    document.getElementById("result").innerHTML =
      `<p class="text-danger">Error: ${err.message}</p>`;
  }
}

async function showAll() {
  try {
    const res = await fetch(`${API_BASE}/results`);
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();
    document.getElementById("allResults").innerHTML =
      `<pre>${JSON.stringify(data, null, 2)}</pre>`;
  } catch (err) {
    document.getElementById("allResults").innerHTML =
      `<p class="text-danger">Error: ${err.message}</p>`;
  }
}
</script>
</body>
</html>
