<!DOCTYPE html>
<html>
<head>
  <title>Company Enrichment</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
  <h2>Company Enrichment Tool</h2>

  <!-- Enrich Section -->
  <div class="mb-3">
    <input id="urlInput" class="form-control" placeholder="Enter company URL">
    <button class="btn btn-primary mt-2" onclick="enrich()">Enrich</button>
  </div>

  <div id="result" class="mt-3"></div>

  <!-- Results Section -->
  <button class="btn btn-success mt-4" onclick="showAll()">Show All Results</button>
  <div id="allResults" class="mt-3"></div>

<script>
async function enrich() {
    const url = document.getElementById("urlInput").value;
    const response = await fetch("/enrich", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
    });
    const data = await response.json();
    document.getElementById("results").innerText = JSON.stringify(data, null, 2);
}

async function showResults() {
    const response = await fetch("/results");
    const data = await response.json();
    document.getElementById("results").innerText = JSON.stringify(data, null, 2);
}
</script>
</body>
</html>
